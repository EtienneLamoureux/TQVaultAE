name: Build and Test

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
  pull_request:
    branches: [master]
    paths:
      - 'src/**'
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"
  SOLUTION_FILE: "TQVaultAE.slnx"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build Release
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore

      - name: Upload TQVaultAE.GUI artifacts (Release)
        uses: actions/upload-artifact@v4
        with:
          name: TQVaultAE-GUI-Release
          path: src/TQVaultAE.GUI/bin/Release/net10.0-windows/
          retention-days: 3

      - name: Upload TQ.SaveFilesExplorer artifacts (Release)
        uses: actions/upload-artifact@v4
        with:
          name: TQ-SaveFilesExplorer-Release
          path: src/TQSaveFilesExplorer/bin/Release/net48/
          retention-days: 3

      - name: Upload ARZExplorer artifacts (Release)
        uses: actions/upload-artifact@v4
        with:
          name: ARZExplorer-Release
          path: src/ARZExplorer/bin/Release/net10.0-windows/
          retention-days: 3

  test:
    runs-on: windows-latest
    needs: build
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build test project
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ${{ env.SOLUTION_FILE }} --configuration Release --verbosity normal --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/TestResults/*.trx"
          retention-days: 3

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        if: always()
        with:
          files: "**/TestResults/*.trx"
