name: Auto Version and Release

on:
  push:
    branches: [master]
    paths:
      - 'version-info.json'

env:
  DOTNET_VERSION: "10.0.x"
  SOLUTION_FILE: "TQVaultAE.slnx"

jobs:
  version-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.VERSION_BUMP_TOKEN }}

      - name: Sync version to all projects
        run: pwsh -File .github/scripts/Update-Version.ps1 -VersionType "Sync"

      - name: Commit version sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -u
          git commit -m "chore: sync version from version-info.json [skip ci]" || echo "No changes to commit"
          git push || echo "Nothing to push"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build Release
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore

      - name: Read version for tag
        id: version-tag
        shell: pwsh
        run: |
          $versionInfo = Get-Content version-info.json | ConvertFrom-Json
          $tagName = "$($versionInfo.Major).$($versionInfo.Minor).$($versionInfo.Build)"
          "version=$tagName" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $tagName"

      - name: Create version tag
        run: |
          git tag ${{ steps.version-tag.outputs.version }}
          git push origin ${{ steps.version-tag.outputs.version }}

      - name: Create release archives
        shell: pwsh
        run: |
          $version = "${{ steps.version-tag.outputs.version }}"
          
          # Create TQVaultAE.GUI archive (.NET 10.0 Windows)
          Compress-Archive -Path "src/TQVaultAE.GUI/bin/Release/net10.0-windows/*" -DestinationPath "TQVaultAE.GUI-$version.zip" -Force
          
          # Create TQSaveFilesExplorer archive (.NET Framework 4.8)
          Compress-Archive -Path "src/TQSaveFilesExplorer/bin/Release/net48/*" -DestinationPath "TQSaveFilesExplorer-$version.zip" -Force
          
          # Create ARZExplorer archive (.NET 10.0 Windows)
          Compress-Archive -Path "src/ARZExplorer/bin/Release/net10.0-windows/*" -DestinationPath "ARZExplorer-$version.zip" -Force
          
          Write-Host "Created release archives:"
          Get-ChildItem *.zip

      - name: Upload TQVaultAE.GUI artifacts (Release)
        uses: actions/upload-artifact@v4
        with:
          name: TQVaultAE-GUI-Release
          path: src/TQVaultAE.GUI/bin/Release/net10.0-windows/
          retention-days: 3

      - name: Upload TQ.SaveFilesExplorer artifacts (Release)
        uses: actions/upload-artifact@v4
        with:
          name: TQ-SaveFilesExplorer-Release
          path: src/TQSaveFilesExplorer/bin/Release/net48/
          retention-days: 3

      - name: Upload ARZExplorer artifacts (Release)
        uses: actions/upload-artifact@v4
        with:
          name: ARZExplorer-Release
          path: src/ARZExplorer/bin/Release/net10.0-windows/
          retention-days: 3

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version-tag.outputs.version }}
          files: |
            TQVaultAE.GUI-*.zip
            TQSaveFilesExplorer-*.zip
            ARZExplorer-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
